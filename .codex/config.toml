[features]
multi_agent = true

[agents]
max_threads = 12

[agents.orchestrator]
description = "Primary orchestration lead for this repository: routes slices, chooses specialist roles, enforces roadmap alignment, and closes review with evidence."
config_file = "agents/orchestrator.toml"

[agents.cross_module]
description = "Executes cross-module contract-first implementation slices across producer/consumer/orchestrator boundaries with strict integration discipline."
config_file = "agents/cross_module.toml"

[agents.cross_module_high]
description = "Executes standard cross-module implementation slices with high reasoning and strict boundary discipline."
config_file = "agents/cross_module_high.toml"

[agents.planning]
description = "Builds thorough execution plans, slice breakdowns, acceptance criteria, and dependency-aware sequencing before implementation."
config_file = "agents/planning.toml"

[agents.planning_architecture]
description = "Plans architectural improvements with explicit boundaries, tradeoffs, migration path, and reversibility."
config_file = "agents/planning_architecture.toml"

[agents.frontend_arch]
description = "Designs scalable frontend architecture and UX consistency."
config_file = "agents/frontend_arch.toml"

[agents.frontend_documentation]
description = "Maintains frontend endpoint maps, portal ownership docs, and frontend handoff consistency."
config_file = "agents/frontend_arch.toml"

[agents.security_auditor]
description = "Finds auth, injection, and secrets risks."
config_file = "agents/security_auditor.toml"

[agents.code_reviewer]
