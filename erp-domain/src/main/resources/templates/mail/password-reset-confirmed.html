<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{mail/layout :: layout(~{::content})}">
<body>
<div th:fragment="content">

  <h1 class="body-font hero-text"
      style="margin: 0 0 22px 0; color: #001F3F; font-size: 26px; font-weight: 600; line-height: 1.3;">
    Password updated
  </h1>

  <p class="body-font" style="margin: 0 0 18px 0; font-size: 15px; line-height: 1.7; color: #475569;">
    Hello <span th:text="${displayName}">there</span>,
  </p>

  <p class="body-font" style="margin: 0 0 26px 0; font-size: 15px; line-height: 1.7; color: #475569;">
    Your password for <strong th:text="${email}">your account</strong> has been changed successfully.
  </p>

  <table role="presentation" border="0" cellspacing="0" cellpadding="0" style="margin: 0 0 26px 0;">
    <tr>
      <td align="left" bgcolor="#001F3F" style="border-radius: 4px;">
        <a class="btn" th:href="${loginUrl}"
           style="font-size: 14px; font-weight: 600; color: #ffffff; text-decoration: none; padding: 14px 28px; display: inline-block; border: 1px solid #001F3F; border-radius: 4px;">
          Open ERP
        </a>
      </td>
    </tr>
  </table>

  <p class="body-font" style="margin: 0; font-size: 14px; line-height: 1.7; color: #64748B;">
    If you did not make this change, reset your password immediately and contact support.
  </p>

</div>
</body>
</html>
