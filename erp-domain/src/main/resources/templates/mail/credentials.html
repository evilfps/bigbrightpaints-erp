<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{mail/layout :: layout(~{::content})}">
<body>
<div th:fragment="content">

  <h1 class="body-font hero-text"
      style="margin: 0 0 22px 0; color: #001F3F; font-size: 26px; font-weight: 600; line-height: 1.3;">
    Your account is ready
  </h1>

  <p class="body-font" style="margin: 0 0 18px 0; font-size: 15px; line-height: 1.7; color: #475569;">
    Welcome <span th:text="${displayName}">there</span>,
  </p>

  <p class="body-font" style="margin: 0 0 22px 0; font-size: 15px; line-height: 1.7; color: #475569;">
    Use the temporary password below to sign in. You'll be asked to change it on your first login.
  </p>

  <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
         style="width: 100%; border: 1px solid #E2E8F0; border-radius: 8px; background: #ffffff; margin: 0 0 22px 0;">
    <tr>
      <td style="padding: 16px 16px 8px 16px;">
        <div class="body-font" style="font-weight: 700; color: #334155; font-size: 13px; margin: 0 0 8px 0;">Email</div>
        <div style="background: #F8FAFC; border: 1px solid #E2E8F0; color: #001F3F; padding: 10px 12px; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 13px;"
             th:text="${email}">user@example.com</div>
      </td>
    </tr>
    <tr th:if="${companyCode != null}">
      <td style="padding: 8px 16px 8px 16px;">
        <div class="body-font" style="font-weight: 700; color: #334155; font-size: 13px; margin: 0 0 8px 0;">Company Code</div>
        <div style="background: #EFF6FF; border: 1px solid #BFDBFE; color: #1E3A8A; padding: 10px 12px; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 13px;"
             th:text="${companyCode}">ROOT</div>
      </td>
    </tr>
    <tr>
      <td style="padding: 8px 16px 16px 16px;">
        <div class="body-font" style="font-weight: 700; color: #334155; font-size: 13px; margin: 0 0 8px 0;">Temporary Password</div>
        <div style="background: #FFF7ED; border: 1px solid #FED7AA; color: #9A3412; padding: 10px 12px; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size: 13px;"
             th:text="${temporaryPassword}">TempPass123</div>
      </td>
    </tr>
  </table>

  <table role="presentation" border="0" cellspacing="0" cellpadding="0" style="margin: 0 0 20px 0;">
    <tr>
      <td align="left" bgcolor="#001F3F" style="border-radius: 4px;">
        <a class="btn" th:href="${loginUrl}"
           style="font-size: 14px; font-weight: 600; color: #ffffff; text-decoration: none; padding: 14px 28px; display: inline-block; border: 1px solid #001F3F; border-radius: 4px;">
          Open ERP
        </a>
      </td>
    </tr>
  </table>

  <p class="body-font" style="margin: 0; font-size: 14px; line-height: 1.7; color: #64748B;">
    If you did not request this account, please contact support.
  </p>

</div>
</body>
</html>
