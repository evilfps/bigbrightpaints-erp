server:
  port: ${SERVER_PORT:8082}
  address: 0.0.0.0

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/bigbright_benchmark}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}

jwt:
  secret: ${JWT_SECRET:}
  access-token-ttl-seconds: ${JWT_ACCESS_TTL:86400}
  refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:604800}

erp:
  benchmark:
    # Override system date to allow all Jan/Feb 2026 transactions
    override-date: ${ERP_BENCHMARK_OVERRIDE_DATE:2026-02-28}
    # Skip date validation for posting (allows any past/future date)
    skip-date-validation: ${ERP_BENCHMARK_SKIP_DATE_VALIDATION:true}
  security:
    encryption.key: ${ERP_SECURITY_ENCRYPTION_KEY}
    mfa.enabled: false
  dispatch:
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:0}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:0}
  cors:
    allowed-origins: ${ERP_CORS_ALLOWED_ORIGINS:*}
  license:
    enforce: ${ERP_LICENSE_ENFORCE:false}
  mail:
    from: ${ERP_MAIL_FROM:benchmark@test.local}
    base-url: ${ERP_MAIL_BASE_URL:http://localhost:8082}

management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9091}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  health:
    rabbit:
      enabled: true

logging:
  level:
    com.bigbrightpaints: INFO
    org.springframework.transaction: WARN
