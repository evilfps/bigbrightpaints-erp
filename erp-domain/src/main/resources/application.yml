spring:
  application:
    name: erp-domain
  profiles:
    default: prod
    group:
      prod:
        - flyway-v2
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/erp_domain}
    username: ${SPRING_DATASOURCE_USERNAME:erp}
    password: ${SPRING_DATASOURCE_PASSWORD:erp}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: erp-backend-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      batch-size: 16384
      linger-ms: 1
      buffer-memory: 33554432
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS_ENABLE:false}
            required: ${SPRING_MAIL_STARTTLS_REQUIRED:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui

orchestrator:
  outbox:
    cron: "0/30 * * * * *"
    publish-lease-seconds: 120
    ambiguous-recheck-seconds: 300
    lock-at-most-for: "PT5M"
  order-dispatch:
    enabled: false

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3004}

erp:
  licensing:
    product-id: ${ERP_LICENSE_PRODUCT_ID:31720}
    license-key: ${ERP_LICENSE_KEY:ORCHESTRATOR}
    algorithm: ${ERP_LICENSE_ALGORITHM:SKM15}
    created: ${ERP_LICENSE_CREATED:2025-12-08}
    description: ${ERP_LICENSE_DESCRIPTION:ERP}
    enforce: ${ERP_LICENSE_ENFORCE:false}
  cors:
    allowed-origins: ${ERP_CORS_ALLOWED_ORIGINS:http://localhost:3002}
  environment:
    validation:
      enabled: false
  security:
    swagger-public: false
    mfa:
      # Master code functionality removed for security - use recovery codes only
    notifications:
      email:
        recipients: ${ERP_SECURITY_NOTIFICATIONS_EMAIL_RECIPIENTS:alerts@localhost}
      slack:
        webhook-url: ${ERP_SECURITY_NOTIFICATIONS_SLACK_WEBHOOK_URL:}
    audit:
      private-key: ${ERP_SECURITY_AUDIT_PRIVATE_KEY}
  accounting:
    enable-triple-entry: true
    financial-year-start: 04-01
    currency: INR
  multi-tenancy:
    enabled: true
  rate-limiting:
    enabled: true
    requests-per-minute: 100
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: gemini-2.5-pro
      max-tokens: 8192
      temperature: 0.7
    service-url: ${AI_SERVICE_URL:http://localhost:8000}
  auto-approval:
    enabled: ${ERP_AUTO_APPROVAL_ENABLED:true}
  export:
    require-approval: ${ERP_EXPORT_REQUIRE_APPROVAL:false}
  seed:
    super-admin:
      email: ${ERP_SEED_SUPER_ADMIN_EMAIL:}
      password: ${ERP_SEED_SUPER_ADMIN_PASSWORD:}
      company-code: ${ERP_SEED_SUPER_ADMIN_COMPANY_CODE:SKE}
  mail:
    enabled: true
    from-address: noreply@bigbrightpaints.com
    base-url: ${ERP_MAIL_BASE_URL:http://localhost:3004}
    send-credentials: ${ERP_MAIL_SEND_CREDENTIALS:true}
    send-password-reset: ${ERP_MAIL_SEND_PASSWORD_RESET:true}
  dispatch:
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:0}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:0}
  payroll:
    notification-email: ${ERP_PAYROLL_NOTIFICATION_EMAIL:alerts@localhost}
  raw-material:
    intake:
      enabled: ${ERP_RAW_MATERIAL_INTAKE_ENABLED:false}
  inventory:
    accounting:
      events:
        enabled: false
  github:
    enabled: ${ERP_GITHUB_ENABLED:false}
    token: ${ERP_GITHUB_TOKEN:}
    repo-owner: ${ERP_GITHUB_REPO_OWNER:}
    repo-name: ${ERP_GITHUB_REPO_NAME:}

sentry:
  dsn: ${SENTRY_DSN:}
  send-default-pii: true
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info
  exception-resolver-order: -2147483647

logging:
  level:
    com.bigbrightpaints.erp: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/erp-backend.log

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
    min-response-size: 1024
