server:
  port: 8081
  address: 0.0.0.0
spring:
  autoconfigure:
    exclude: org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_STARTTLS_ENABLE:false}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bigbright_erp}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
jwt:
  # JWT secret fallback is test-only; non-test profiles must provide JWT_SECRET.
  secret: ${JWT_SECRET:}
  access-token-ttl-seconds: 3600
  refresh-token-ttl-seconds: 604800
erp:
  security:
    swagger-public: true
    encryption.key: ${ERP_SECURITY_ENCRYPTION_KEY}
    mfa.enabled: true
  dispatch:
    # Configure with realistic account IDs in your dev DB to enable dispatch journals
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:0}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:0}
  mail:
    base-url: http://localhost:3002

management:
  health:
    rabbit:
      enabled: false
