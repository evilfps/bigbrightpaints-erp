spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/erp_domain_test
    username: erp_test
    password: erp_test
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: ${SPRING_FLYWAY_LOCATIONS:classpath:db/migration_v2}
    table: ${SPRING_FLYWAY_TABLE:flyway_schema_history_v2}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
erp:
  dispatch:
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:0}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:0}
  auto-approval:
    enabled: false
  export:
    require-approval: false
