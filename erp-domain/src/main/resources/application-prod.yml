spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_POOL_MAX:30}
      minimum-idle: ${SPRING_DATASOURCE_POOL_MIN:5}
      idle-timeout: 300000
      connection-timeout: 20000
  mail:
    host: ${SMTP_HOST:${SPRING_MAIL_HOST:}}
    port: ${SMTP_PORT:${SPRING_MAIL_PORT:587}}
    username: ${SMTP_USERNAME:${SPRING_MAIL_USERNAME:}}
    password: ${SMTP_PASSWORD:${SPRING_MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  flyway:
    enabled: true
  lifecycle:
    timeout-per-shutdown-phase: ${SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE:30s}
  jpa:
    properties:
      hibernate:
        default_schema: public
  mvc:
    cors:
      enabled: true
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_MAX_THREADS:200}
logging:
  level:
    root: INFO
    org.springframework.web: WARN
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
jwt:
  # Must be 32+ bytes; prefer env/secret manager override
  secret: ${JWT_SECRET}
  # Default 15 min access; tune for UX vs security
  access-token-ttl-seconds: ${JWT_ACCESS_TTL:900}
  # Default 30 days refresh; reduce for shared environments
  refresh-token-ttl-seconds: ${JWT_REFRESH_TTL:2592000}
erp:
  environment:
    validation:
      enabled: true
      health-indicator:
        enabled: true
  security:
    swagger-public: false
  licensing:
    product-id: ${ERP_LICENSE_PRODUCT_ID:31720}
    license-key: ${ERP_LICENSE_KEY}
    algorithm: ${ERP_LICENSE_ALGORITHM:SKM15}
    created: ${ERP_LICENSE_CREATED:2025-12-08}
    description: ${ERP_LICENSE_DESCRIPTION:ERP}
    enforce: ${ERP_LICENSE_ENFORCE:true}
  mail:
    enabled: true
    from-address: ${ERP_MAIL_FROM:noreply@bigbrightpaints.com}
    base-url: ${ERP_MAIL_BASE_URL:https://app.bigbrightpaints.com}
    send-credentials: true
    send-password-reset: true
  cors:
    # Set to the exact frontend origins; avoid wildcards in prod
    allowed-origins: ${ERP_CORS_ALLOWED_ORIGINS:https://app.bigbrightpaints.com}
  rate-limiting:
    enabled: true
    # Tune per deployment; 60 RPM default may be too low for high-traffic tenants
    requests-per-minute: ${ERP_RATE_LIMIT_RPM:60}
  dispatch:
    debit-account-id: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID}
    credit-account-id: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID}
  inventory:
    accounting:
      events:
        enabled: false
management:
  server:
    port: ${MANAGEMENT_SERVER_PORT:9090}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      cors:
        allowed-origins: ${MANAGEMENT_CORS_ALLOWED_ORIGINS:https://ops.bigbrightpaints.com}
        allowed-methods: GET
  info:
    env:
      enabled: false
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState,ping,diskSpace
        readiness:
          include: readinessState,db,rabbit,diskSpace,requiredConfig,configuration
      show-details: when_authorized
    metrics:
      access: read-only
    prometheus:
      access: read-only
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
      headers: ${OTEL_EXPORTER_OTLP_HEADERS:}
      timeout: ${OTEL_EXPORTER_OTLP_TIMEOUT:5s}
  tracing:
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  security:
    enabled: true
