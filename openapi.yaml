components:
  schemas:
    SupplierRequest:
      required:
      - name
      type: object
      properties:
        name:
          maxLength: 64
          minLength: 0
          type: string
        code:
          maxLength: 64
          minLength: 0
          type: string
        contactEmail:
          type: string
        contactPhone:
          maxLength: 32
          minLength: 0
          type: string
        address:
          maxLength: 512
          minLength: 0
          type: string
        creditLimit:
          minimum: 0.00
          exclusiveMinimum: false
          type: number
    ApiResponseSupplierResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/SupplierResponse"
        timestamp:
          type: string
          format: date-time
    SupplierResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        publicId:
          type: string
          format: uuid
        code:
          type: string
        name:
          type: string
        status:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        creditLimit:
          type: number
        outstandingBalance:
          type: number
        payableAccountId:
          type: integer
          format: int64
        payableAccountCode:
          type: string
    SalesTargetRequest:
      required:
      - name
      - periodEnd
      - periodStart
      - targetAmount
      type: object
      properties:
        name:
          type: string
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        targetAmount:
          type: number
        achievedAmount:
          type: number
        assignee:
          type: string
    ApiResponseSalesTargetDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/SalesTargetDto"
        timestamp:
          type: string
          format: date-time
    SalesTargetDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        publicId:
          type: string
          format: uuid
        name:
          type: string
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        targetAmount:
          type: number
        achievedAmount:
          type: number
        assignee:
          type: string
    PromotionRequest:
      required:
      - discountType
      - discountValue
      - endDate
      - name
      - startDate
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        discountType:
          type: string
        discountValue:
          type: number
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
    ApiResponsePromotionDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/PromotionDto"
        timestamp:
          type: string
          format: date-time
    PromotionDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        publicId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        discountType:
          type: string
        discountValue:
          type: number
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
    SalesOrderItemRequest:
      required:
      - productCode
      - quantity
      - unitPrice
      type: object
      properties:
        productCode:
          type: string
        description:
          type: string
        quantity:
          type: number
        unitPrice:
          type: number
        gstRate:
          type: number
    SalesOrderRequest:
      required:
      - items
      - totalAmount
      type: object
      properties:
        dealerId:
          type: integer
          format: int64
        totalAmount:
          type: number
        currency:
          type: string
        notes:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SalesOrderItemRequest"
        gstTreatment:
          type: string
        gstRate:
          type: number
        gstInclusive:
          type: boolean
        idempotencyKey:
          type: string
    ApiResponseSalesOrderDto:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/SalesOrderDto"
        timestamp:
          type: string
          format: date-time
    SalesOrderDto:
      type: object
