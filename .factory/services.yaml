commands:
  init: /home/realnigga/Desktop/Mission-control/.factory/init.sh
  compile: cd /home/realnigga/Desktop/Mission-control/erp-domain && mvn compile -q
  typecheck: cd /home/realnigga/Desktop/Mission-control/erp-domain && mvn compile -q
  test: cd /home/realnigga/Desktop/Mission-control/erp-domain && mvn test -Pgate-fast -Djacoco.skip=true
  test-auth: cd /home/realnigga/Desktop/Mission-control/erp-domain && mvn test -Djacoco.skip=true -pl . '-Dtest=AuthControllerIT,AuthHardeningIT,AuthPasswordResetPublicContractIT,AuthDisabledUserTokenIT,PasswordResetServiceTest,PasswordServiceTest,TenantRuntimeEnforcementAuthIT,AdminUserSecurityIT,AdminUserServiceTest,SystemSettingsServiceCorsTest'
  test-contracts: cd /home/realnigga/Desktop/Mission-control/erp-domain && mvn test -Djacoco.skip=true -pl . '-Dtest=AuthControllerIT,AuthPasswordResetPublicContractIT,OpenApiSnapshotIT,AdminSettingsControllerTenantRuntimeContractTest,CompanyContextFilterPasswordResetBypassTest'
  lint: bash /home/realnigga/Desktop/Mission-control/ci/lint-knowledgebase.sh && bash /home/realnigga/Desktop/Mission-control/ci/check-architecture.sh && bash /home/realnigga/Desktop/Mission-control/ci/check-enterprise-policy.sh && bash /home/realnigga/Desktop/Mission-control/ci/check-orchestrator-layer.sh && python3 /home/realnigga/Desktop/Mission-control/scripts/check_flaky_tags.py --tests-root /home/realnigga/Desktop/Mission-control/erp-domain/src/test/java --gate gate-fast && bash /home/realnigga/Desktop/Mission-control/scripts/guard_openapi_contract_drift.sh
  runtime-probe: curl -sf http://localhost:9090/actuator/health

services:
  postgres-existing:
    start: echo "Reuse existing local PostgreSQL on port 5432 for this mission."
    stop: echo "No-op: local PostgreSQL on 5432 is outside mission ownership."
    healthcheck: python3 -c "import socket; s=socket.create_connection(('127.0.0.1', 5432), 2); s.close()"
    port: 5432
    depends_on: []

  rabbitmq:
    start: docker compose up -d rabbitmq
    stop: docker compose stop rabbitmq
    healthcheck: python3 -c "import socket; s=socket.create_connection(('127.0.0.1', 5672), 2); s.close()"
    port: 5672
    depends_on: []

  mailhog:
    start: docker compose up -d mailhog
    stop: docker compose stop mailhog
    healthcheck: curl -sf http://localhost:8025
    port: 8025
    depends_on: []

  backend:
    start: cd /home/realnigga/Desktop/Mission-control/erp-domain && SPRING_PROFILES_ACTIVE=dev SERVER_PORT=8081 MANAGEMENT_SERVER_PORT=9090 mvn spring-boot:run
    stop: lsof -ti :8081 -ti :9090 | xargs -r kill
    healthcheck: curl -sf http://localhost:9090/actuator/health
    port: 8081
    depends_on: [postgres-existing, rabbitmq, mailhog]
