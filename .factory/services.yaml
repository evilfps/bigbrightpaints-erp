commands:
  init: /home/realnigga/Desktop/Mission-control/.factory/init.sh
  compile: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn -T8 compile -q
  typecheck: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn -T8 compile -q
  test: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn -T8 test -Pgate-fast -Djacoco.skip=true
  test-dev-smoke: >-
    cd /home/realnigga/Desktop/Mission-control && MIGRATION_SET=v2 bash scripts/dev_smoke.sh
  test-local-guard: >-
    cd /home/realnigga/Desktop/Mission-control && MIGRATION_SET=v2 bash scripts/local_guard.sh
  validate-confidence-lanes: >-
    cd /home/realnigga/Desktop/Mission-control && python3 scripts/validate_confidence_lanes.py --contract testing/local/confidence-lanes.json
  test-pr-ci: >-
    cd /home/realnigga/Desktop/Mission-control && bash scripts/gate_fast.sh
  test-baseline-core: >-
    cd /home/realnigga/Desktop/Mission-control && bash scripts/gate_core.sh
  test-baseline-reconciliation: >-
    cd /home/realnigga/Desktop/Mission-control && bash scripts/gate_reconciliation.sh
  test-baseline-quality: >-
    cd /home/realnigga/Desktop/Mission-control && bash scripts/gate_quality.sh
  test-release-local: >-
    cd /home/realnigga/Desktop/Mission-control && MIGRATION_SET=v2 bash scripts/verify_local.sh
  test-merge-gate: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn test -Djacoco.skip=true -pl . '-Dtest=TokenBlacklistServiceTest,AuthPasswordResetPublicContractIT,AdminUserServiceTest,AdminUserSecurityIT,TenantRuntimeEnforcementServiceTest,TS_RuntimeTenantPolicyControlExecutableCoverageTest'
  test-lane01: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn test -Djacoco.skip=true -pl . '-Dtest=AdminSettingsControllerTenantRuntimeContractTest,SystemSettingsServiceCorsTest,CompanyControllerIT,SuperAdminControllerIT,CompanyLifecycleStateConverterTest,TenantLifecycleServiceTest,TenantRuntimeEnforcementServiceTest,TS_RuntimeTenantRuntimeEnforcementTest,TS_RuntimeTenantPolicyControlExecutableCoverageTest,TS_RuntimeCompanyContextFilterExecutableCoverageTest'
  test-lane01-proof: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn test -Djacoco.skip=true -pl . '-Dtest=AdminSettingsControllerTenantRuntimeContractTest,CompanyControllerIT,SuperAdminControllerIT,TS_RuntimeCompanyContextFilterExecutableCoverageTest,TS_RuntimeTenantPolicyControlExecutableCoverageTest'
  test-lane02: >-
    cd /home/realnigga/Desktop/Mission-control/erp-domain && MIGRATION_SET=v2 mvn test -Djacoco.skip=true -pl . '-Dtest=AuthControllerIT,AuthHardeningIT,AuthPasswordResetPublicContractIT,AuthTenantAuthorityIT,PasswordResetServiceTest,PasswordServiceTest,RefreshTokenServiceTest,TokenBlacklistServiceTest,AdminUserSecurityIT,AdminUserServiceTest,TenantAdminProvisioningServiceTest,OpenApiSnapshotIT'
  lint: >-
    bash /home/realnigga/Desktop/Mission-control/ci/lint-knowledgebase.sh && bash /home/realnigga/Desktop/Mission-control/ci/check-architecture.sh && bash /home/realnigga/Desktop/Mission-control/ci/check-enterprise-policy.sh && bash /home/realnigga/Desktop/Mission-control/ci/check-orchestrator-layer.sh && python3 /home/realnigga/Desktop/Mission-control/scripts/check_flaky_tags.py --tests-root /home/realnigga/Desktop/Mission-control/erp-domain/src/test/java --gate gate-fast && bash /home/realnigga/Desktop/Mission-control/scripts/guard_openapi_contract_drift.sh
  packet-review: >-
    git -C /home/realnigga/Desktop/Mission-control status --short --branch && echo FACTORY-DROID && git -C /home/realnigga/Desktop/Mission-control log --oneline --decorate -5 origin/Factory-droid
  runtime-probe: >-
    status1=$(curl -s -o /tmp/factory-health.out -w '%{http_code}' http://localhost:9090/actuator/health || true) && status2=$(curl -s -o /tmp/factory-auth.out -w '%{http_code}' http://localhost:8081/api/v1/auth/me || true) && echo "$status1;$status2" && { [ "$status1" = "200" ] && { [ "$status2" = "200" ] || [ "$status2" = "401" ] || [ "$status2" = "403" ]; }; }

services:
  postgres-existing:
    start: >-
      echo "Reuse existing local PostgreSQL on port 5432 for this mission."
    stop: >-
      echo "No-op: local PostgreSQL on 5432 is outside mission ownership."
    healthcheck: >-
      python3 -c "import socket; s=socket.create_connection(('127.0.0.1', 5432), 2); s.close()"
    port: 5432
    depends_on: []

  postgres-compose-existing:
    start: >-
      echo "Reuse existing compose PostgreSQL on port 5433 for the approved v2 runtime path."
    stop: >-
      echo "No-op: compose PostgreSQL on 5433 is outside mission ownership."
    healthcheck: >-
      python3 -c "import socket; s=socket.create_connection(('127.0.0.1', 5433), 2); s.close()"
    port: 5433
    depends_on: []

  rabbitmq:
    start: >-
      docker compose -f /home/realnigga/Desktop/Mission-control/docker-compose.yml up -d rabbitmq
    stop: >-
      docker compose -f /home/realnigga/Desktop/Mission-control/docker-compose.yml stop rabbitmq
    healthcheck: >-
      python3 -c "import socket; s=socket.create_connection(('127.0.0.1', 5672), 2); s.close()"
    port: 5672
    depends_on: []

  mailhog:
    start: >-
      docker compose -f /home/realnigga/Desktop/Mission-control/docker-compose.yml up -d mailhog
    stop: >-
      docker compose -f /home/realnigga/Desktop/Mission-control/docker-compose.yml stop mailhog
    healthcheck: >-
      curl -sf http://localhost:8025
    port: 8025
    depends_on: []

  backend-compose-v2:
    start: >-
      cd /home/realnigga/Desktop/Mission-control && SPRING_PROFILES_ACTIVE='prod,flyway-v2' ERP_CORS_ALLOWED_ORIGINS='https://app.bigbrightpaints.com' ERP_CORS_ALLOW_TAILSCALE_HTTP_ORIGINS='true' DB_PORT=5433 SPRING_MAIL_HOST='mailhog' SPRING_MAIL_PORT='1025' SPRING_MAIL_USERNAME='' SPRING_MAIL_PASSWORD='' SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH='false' SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE='false' SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED='false' docker compose up -d --build app
    stop: >-
      docker compose -f /home/realnigga/Desktop/Mission-control/docker-compose.yml stop app
    healthcheck: >-
      status=$(curl -s -o /tmp/factory-backend-auth.out -w '%{http_code}' http://localhost:8081/api/v1/auth/me || true) && { [ "$status" = "200" ] || [ "$status" = "401" ] || [ "$status" = "403" ]; }
    port: 8081
    depends_on: [postgres-compose-existing, rabbitmq, mailhog]
