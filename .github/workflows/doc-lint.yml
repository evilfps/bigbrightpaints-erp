name: Docs Lint (Manual)

on:
  workflow_dispatch:

jobs:
  knowledgebase-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Lint knowledge base
        run: |
          set -euo pipefail
          bash ci/lint-knowledgebase.sh
