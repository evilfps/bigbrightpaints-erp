name: CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  erp-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: CODE-RED schema drift scan
        run: |
          set -euo pipefail
          bash scripts/schema_drift_scan.sh

      - name: Run tests (erp-domain)
        working-directory: erp-domain
        run: |
          set -euo pipefail
          mirrors=(
            "${MAVEN_MIRROR_PRIMARY:-https://repo.maven.apache.org/maven2}"
            "${MAVEN_MIRROR_FALLBACK:-https://maven-central.storage-download.googleapis.com/maven2}"
          )
          for mirror in "${mirrors[@]}"; do
            echo "Using Maven mirror: ${mirror}"
            if mvn -B -ntp -Dmaven.mirror.url="${mirror}" verify; then
              exit 0
            fi
            echo "Mirror failed: ${mirror}" >&2
          done
          exit 1

      - name: CODE-RED test triage
        if: always()
        run: |
          set -euo pipefail
          bash scripts/triage_tests.sh

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-erp-domain
          path: erp-domain/target/site/jacoco/**

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-erp-domain
          path: erp-domain/target/surefire-reports/**
