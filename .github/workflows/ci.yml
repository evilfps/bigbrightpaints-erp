        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile codered \
            --label codered-finance \
            --manifest ci/pr_manifests/pr_codered_finance.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
