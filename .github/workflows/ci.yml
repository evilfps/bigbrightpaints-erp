      ERP_TEST_DB_USERNAME: erp_test
      ERP_TEST_DB_PASSWORD: erp_test
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
