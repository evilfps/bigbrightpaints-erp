  pr-changed-coverage:
    name: Changed-Code Coverage
    if: always() && github.event_name == 'pull_request'
    needs:
      - pr-risk-router
      - pr-auth-tenant
      - pr-accounting
      - pr-idempotency-outbox
      - pr-business-slice
      - pr-persistence-smoke
      - pr-codered-access
      - pr-codered-finance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download shard coverage
        if: needs.pr-risk-router.outputs.run_changed_coverage == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: pr-jacoco-*
          path: artifacts/pr-jacoco

      - name: Enforce changed-files coverage
        env:
          DIFF_BASE: ${{ needs.pr-risk-router.outputs.effective_diff_base }}
          RUN_CHANGED_COVERAGE: ${{ needs.pr-risk-router.outputs.run_changed_coverage }}
          CHANGED_FILES_COUNT: ${{ needs.pr-risk-router.outputs.changed_files_count }}
          CHANGED_RUNTIME_SOURCE_COUNT: ${{ needs.pr-risk-router.outputs.changed_runtime_source_count }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/pr-jacoco

          if [[ "$RUN_CHANGED_COVERAGE" != "true" ]]; then
            python3 -c 'import json, os; summary = {"diff_base": os.environ["DIFF_BASE"], "skipped": True, "reason": "no_runtime_source_changes", "changed_files_count": int(os.environ["CHANGED_FILES_COUNT"]), "changed_runtime_source_count": int(os.environ["CHANGED_RUNTIME_SOURCE_COUNT"]), "passes": True}; output_path = "artifacts/pr-jacoco/changed-coverage.json"; open(output_path, "w", encoding="utf-8").write(json.dumps(summary, indent=2)); print("[pr-changed-coverage] no runtime source changes; recorded explicit skip summary"); print(json.dumps(summary, indent=2))'
            exit 0
          fi

          mapfile -t jacoco_files < <(find artifacts/pr-jacoco -name jacoco.xml -type f | sort)
          if [[ "${#jacoco_files[@]}" -eq 0 ]]; then
            echo "[pr-changed-coverage] FAIL: no shard jacoco.xml files were downloaded" >&2
            exit 1
          fi

          args=()
          for jacoco_file in "${jacoco_files[@]}"; do
            args+=(--jacoco "$jacoco_file")
          done

          python3 scripts/changed_files_coverage.py \
            "${args[@]}" \
            --diff-base "$DIFF_BASE" \
            --src-root erp-domain/src/main/java \
            --threshold-line 0.95 \
            --threshold-branch 0.90 \
            --fail-on-vacuous \
            --output artifacts/pr-jacoco/changed-coverage.json

      - name: Upload changed coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-changed-coverage
          path: artifacts/pr-jacoco/changed-coverage.json
          if-no-files-found: ignore

  pr-merge-gate:
    name: PR Ship Gate
    if: always() && github.event_name == 'pull_request'
    needs:
      - ci-config-check
      - knowledgebase-lint
      - architecture-check
      - high-risk-change-control
      - secrets-scan
      - pr-risk-router
      - pr-build
      - pr-auth-tenant
      - pr-accounting
      - pr-idempotency-outbox
      - pr-business-slice
      - pr-persistence-smoke
      - pr-codered-access
      - pr-codered-finance
      - pr-changed-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Evaluate PR gate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          blocking = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in {"success", "skipped"}
          }

          labels = {
              "ci-config-check": ("ci-config", "CI Config Check"),
              "knowledgebase-lint": ("docs", "Docs Lint"),
              "architecture-check": ("module-boundary", "Module Boundary Check"),
              "high-risk-change-control": ("high-risk-control", "High-Risk Change Control"),
              "secrets-scan": ("secrets", "Secrets Scan"),
              "pr-risk-router": ("ci-routing", "Change Impact Router"),
              "pr-build": ("compile", "Compile Check"),
              "pr-auth-tenant": ("product-tests", "Access And Tenant Tests"),
              "pr-accounting": ("product-tests", "Finance And Accounting Tests"),
              "pr-idempotency-outbox": ("product-tests", "Idempotency And Outbox Tests"),
              "pr-business-slice": ("product-tests", "Workflow Integration Tests"),
              "pr-persistence-smoke": ("product-tests", "Persistence Smoke"),
              "pr-codered-access": ("security-tests", "CODE-RED Access Tests"),
              "pr-codered-finance": ("finance-tests", "CODE-RED Finance Tests"),
              "pr-changed-coverage": ("changed-code-coverage", "Changed-Code Coverage"),
          }

          if blocking:
              print("[pr-ship-gate] FAIL: blocking jobs detected")
              for name, result in sorted(blocking.items()):
                  blocker_type, label = labels.get(name, ("unknown", name))
                  print(f"  - {label}: {result} [{blocker_type}]")
              sys.exit(1)

          print("[pr-ship-gate] OK: all required jobs succeeded or were skipped")
          PY

  gate-fast:
    name: Gate Fast
    needs: [ci-config-check, knowledgebase-lint, architecture-check, high-risk-change-control]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.diff_base != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Fast
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export DIFF_BASE="${{ github.event.pull_request.base.sha }}"
            export GATE_FAST_RELEASE_VALIDATION_MODE=false
            export GATE_FAST_SYNC_PR_MODE=false
            if [[ "${HEAD_REF}" == sync/* ]]; then
              export GATE_FAST_SYNC_PR_MODE=true
            fi
          else
            export DIFF_BASE="${{ github.event.inputs.diff_base }}"
            export GATE_FAST_RELEASE_VALIDATION_MODE=true
            export GATE_FAST_SYNC_PR_MODE=false
          fi
          bash scripts/gate_fast.sh

      - name: Upload gate-fast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-fast-artifacts
          path: |
            artifacts/gate-fast/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

