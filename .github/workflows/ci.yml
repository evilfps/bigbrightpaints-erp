name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      run_release_gates:
        description: "Run gate-release and gate-reconciliation"
        required: false
        default: "true"
      run_quality_gate:
        description: "Run gate-quality in this manual execution"
        required: false
        default: "false"
      flake_runs:
        description: "Override FLAKE_RUNS for gate-quality"
        required: false
        default: "20"
      diff_base:
        description: "Explicit DIFF_BASE SHA for branch-as-trunk gate-fast certification"
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"

env:
  MIGRATION_SET: v2

jobs:
  knowledgebase-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Knowledge Base Lint
        run: |
          set -euo pipefail
          bash ci/lint-knowledgebase.sh

  architecture-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Architecture Check
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export ARCH_DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          fi
          bash ci/check-architecture.sh

  enterprise-policy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enterprise Policy Check
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export ENTERPRISE_DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          fi
          bash ci/check-enterprise-policy.sh

  orchestrator-layer-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Orchestrator Layer Check
        run: |
          set -euo pipefail
          bash ci/check-orchestrator-layer.sh

  gate-fast:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.diff_base != '')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Fast
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export DIFF_BASE="${{ github.event.pull_request.base.sha }}"
            export GATE_FAST_RELEASE_VALIDATION_MODE=false
            export GATE_FAST_SYNC_PR_MODE=false
            if [[ "${{ github.head_ref }}" == sync/* ]]; then
              export GATE_FAST_SYNC_PR_MODE=true
            fi
          else
            export DIFF_BASE="${{ github.event.inputs.diff_base }}"
            export GATE_FAST_RELEASE_VALIDATION_MODE=true
            export GATE_FAST_SYNC_PR_MODE=false
          fi
          bash scripts/gate_fast.sh

      - name: Upload gate-fast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-fast-artifacts
          path: |
            artifacts/gate-fast/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

  gate-core:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Core
        run: |
          set -euo pipefail
          bash scripts/gate_core.sh

      - name: Upload gate-core artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-core-artifacts
          path: |
            artifacts/gate-core/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

  gate-release:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_gates != 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Release
        env:
          MIGRATION_SET: v2
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          bash scripts/gate_release.sh

      - name: Upload gate-release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-release-artifacts
          path: |
            artifacts/gate-release/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

  gate-reconciliation:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_gates != 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Reconciliation
        run: |
          set -euo pipefail
          bash scripts/gate_reconciliation.sh

      - name: Upload gate-reconciliation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reconciliation-artifacts
          path: |
            artifacts/gate-reconciliation/**
            erp-domain/target/surefire-reports/**

  gate-quality:
    needs: [knowledgebase-lint, architecture-check]
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_quality_gate == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Quality
        env:
          FLAKE_RUNS: ${{ github.event.inputs.flake_runs || '20' }}
        run: |
          set -euo pipefail
          bash scripts/gate_quality.sh

      - name: Upload gate-quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-quality-artifacts
          path: |
            artifacts/gate-quality/**
            erp-domain/target/pit-reports/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**
