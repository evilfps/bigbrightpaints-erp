name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      run_release_gates:
        description: "Run gate-release and gate-reconciliation"
        required: false
        default: "true"
      run_quality_gate:
        description: "Run gate-quality in this manual execution"
        required: false
        default: "false"
      flake_runs:
        description: "Override FLAKE_RUNS for gate-quality"
        required: false
        default: "20"
      diff_base:
        description: "Explicit DIFF_BASE SHA for branch-as-trunk gate-fast certification"
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"

env:
  MIGRATION_SET: v2
  TESTCONTAINERS_RYUK_DISABLED: "true"

jobs:
  ci-config-check:
    name: CI Config Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Install CI config tools
        run: |
          set -euo pipefail
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Check CI config
        env:
          CI_CONFIG_DIFF_BASE: ${{ github.event.pull_request.base.sha || github.event.before || '' }}
        run: |
          set -euo pipefail
          export PATH="$(go env GOPATH)/bin:$PATH"
          bash ci/check-ci-config.sh

  knowledgebase-lint:
    name: Docs Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Knowledge Base Lint
        run: |
          set -euo pipefail
          bash ci/lint-knowledgebase.sh

  architecture-check:
    name: Module Boundary Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Architecture Check
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export ARCH_DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          fi
          bash ci/check-architecture.sh

  high-risk-change-control:
    name: High-Risk Change Control
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: High-Risk Change Control
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export HIGH_RISK_DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          fi
          bash ci/check-high-risk-changes.sh

  secrets-scan:
    name: Secrets Scan
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITLEAKS_VERSION: "8.30.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLo "/tmp/${archive}" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          curl -fsSLo /tmp/gitleaks_checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          awk -v archive="${archive}" '$2 == archive { print }' /tmp/gitleaks_checksums.txt > /tmp/gitleaks_checksum_line.txt
          if [ "$(wc -l < /tmp/gitleaks_checksum_line.txt)" -ne 1 ]; then
            echo "Unexpected number of checksum lines for ${archive}" >&2
            exit 1
          fi
          (cd /tmp && sha256sum -c gitleaks_checksum_line.txt)
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Run secret scan
        run: |
          set -euo pipefail
          gitleaks git . \
            --config .gitleaks.toml \
            --redact \
            --report-format json \
            --report-path gitleaks-report.json \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

      - name: Upload secret scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secrets-scan-report
          path: gitleaks-report.json
          if-no-files-found: ignore

  pr-risk-router:
    name: Change Impact Router
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_auth_tenant: ${{ steps.route.outputs.run_auth_tenant }}
      run_accounting: ${{ steps.route.outputs.run_accounting }}
      run_idempotency_outbox: ${{ steps.route.outputs.run_idempotency_outbox }}
      run_business_slice: ${{ steps.route.outputs.run_business_slice }}
      run_persistence_smoke: ${{ steps.route.outputs.run_persistence_smoke }}
      run_codered_access: ${{ steps.route.outputs.run_codered_access }}
      run_codered_finance: ${{ steps.route.outputs.run_codered_finance }}
      run_changed_coverage: ${{ steps.route.outputs.run_changed_coverage }}
      changed_files_count: ${{ steps.route.outputs.changed_files_count }}
      changed_runtime_source_count: ${{ steps.route.outputs.changed_runtime_source_count }}
      effective_diff_base: ${{ steps.route.outputs.effective_diff_base }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Route Risk
        id: route
        run: |
          set -euo pipefail
          python3 scripts/ci_risk_router.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}" \
            --github-output "$GITHUB_OUTPUT"

  pr-build:
    name: Compile Check
    if: github.event_name == 'pull_request'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile package
        run: |
          set -euo pipefail
          cd erp-domain
          mvn -B -ntp -Ppr-fast -DskipTests package

  pr-auth-tenant:
    name: Access And Tenant Tests
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_auth_tenant == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16-alpine
        env:
          POSTGRES_DB: erp_domain_test
          POSTGRES_USER: erp_test
          POSTGRES_PASSWORD: erp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U erp_test -d erp_domain_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      ERP_TEST_DB_URL: jdbc:postgresql://127.0.0.1:5432/erp_domain_test
      ERP_TEST_DB_USERNAME: erp_test
      ERP_TEST_DB_PASSWORD: erp_test
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run auth and tenant shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile pr-fast \
            --label auth-tenant \
            --maven-arg -Dtest.groups= \
            --manifest ci/pr_manifests/pr_auth_tenant.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-auth-tenant
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-accounting:
    name: Finance And Accounting Tests
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_accounting == 'true'
