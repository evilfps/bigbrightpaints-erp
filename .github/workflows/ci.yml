name: CI

on:
  pull_request:
  push:
    branches: [ main ]
    tags:
      - 'v*'
      - 'release-*'
  workflow_dispatch:
    inputs:
      run_release_gates:
        description: "Run gate-release and gate-reconciliation"
        required: false
        default: "true"
      run_quality_gate:
        description: "Run gate-quality in this manual execution"
        required: false
        default: "false"
      flake_runs:
        description: "Override FLAKE_RUNS for gate-quality"
        required: false
        default: "20"
      diff_base:
        description: "Explicit DIFF_BASE SHA for branch-as-trunk gate-fast certification"
        required: false
        default: ""
  schedule:
    - cron: "17 2 * * *"

env:
  MIGRATION_SET: v2

jobs:
  knowledgebase-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Knowledge Base Lint
        run: |
          set -euo pipefail
          bash ci/lint-knowledgebase.sh

  architecture-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Architecture Check
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export ARCH_DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          fi
          bash ci/check-architecture.sh

  enterprise-policy-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enterprise Policy Check
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export ENTERPRISE_DIFF_BASE="${{ github.event.pull_request.base.sha }}"
          fi
          bash ci/check-enterprise-policy.sh

  orchestrator-layer-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Orchestrator Layer Check
        run: |
          set -euo pipefail
          bash ci/check-orchestrator-layer.sh

  pr-risk-router:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      run_auth_tenant: ${{ steps.route.outputs.run_auth_tenant }}
      run_accounting: ${{ steps.route.outputs.run_accounting }}
      run_idempotency_outbox: ${{ steps.route.outputs.run_idempotency_outbox }}
      run_business_slice: ${{ steps.route.outputs.run_business_slice }}
      run_persistence_smoke: ${{ steps.route.outputs.run_persistence_smoke }}
      run_codered_access: ${{ steps.route.outputs.run_codered_access }}
      run_codered_finance: ${{ steps.route.outputs.run_codered_finance }}
      run_changed_coverage: ${{ steps.route.outputs.run_changed_coverage }}
      changed_files_count: ${{ steps.route.outputs.changed_files_count }}
      changed_runtime_source_count: ${{ steps.route.outputs.changed_runtime_source_count }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Route Risk
        id: route
        run: |
          set -euo pipefail
          python3 scripts/ci_risk_router.py \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.sha }}" \
            --github-output "$GITHUB_OUTPUT"

  pr-build:
    if: github.event_name == 'pull_request'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Compile package
        run: |
          set -euo pipefail
          cd erp-domain
          mvn -B -ntp -Ppr-fast -DskipTests package

  pr-auth-tenant:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_auth_tenant == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run auth and tenant shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile pr-fast \
            --label auth-tenant \
            --maven-arg -Dtest.groups= \
            --manifest ci/pr_manifests/pr_auth_tenant.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-auth-tenant
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-accounting:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_accounting == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run accounting shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile pr-fast \
            --label accounting \
            --manifest ci/pr_manifests/pr_accounting.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-accounting
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-idempotency-outbox:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_idempotency_outbox == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run idempotency and outbox shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile pr-fast \
            --label idempotency-outbox \
            --manifest ci/pr_manifests/pr_idempotency_outbox.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-idempotency-outbox
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-business-slice:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_business_slice == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run business slice shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile pr-fast \
            --label business-slice \
            --manifest ci/pr_manifests/pr_business_slice.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-business-slice
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-persistence-smoke:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_persistence_smoke == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run persistence smoke shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile pr-fast \
            --label persistence-smoke \
            --maven-arg -Dtest.groups= \
            --manifest ci/pr_manifests/pr_persistence_smoke.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-persistence-smoke
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-codered-access:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_codered_access == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run CODE-RED access shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile codered \
            --label codered-access \
            --manifest ci/pr_manifests/pr_codered_access.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-codered-access
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-codered-finance:
    if: github.event_name == 'pull_request' && needs.pr-risk-router.outputs.run_codered_finance == 'true'
    needs: [pr-risk-router]
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run CODE-RED finance shard
        run: |
          set -euo pipefail
          bash scripts/run_test_manifest.sh \
            --profile codered \
            --label codered-finance \
            --manifest ci/pr_manifests/pr_codered_finance.txt

      - name: Upload shard coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-jacoco-codered-finance
          path: erp-domain/target/site/jacoco/jacoco.xml
          if-no-files-found: ignore

  pr-changed-coverage:
    if: always() && github.event_name == 'pull_request'
    needs:
      - pr-risk-router
      - pr-auth-tenant
      - pr-accounting
      - pr-idempotency-outbox
      - pr-business-slice
      - pr-persistence-smoke
      - pr-codered-access
      - pr-codered-finance
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download shard coverage
        if: needs.pr-risk-router.outputs.run_changed_coverage == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: pr-jacoco-*
          path: artifacts/pr-jacoco

      - name: Enforce changed-files coverage
        env:
          DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          RUN_CHANGED_COVERAGE: ${{ needs.pr-risk-router.outputs.run_changed_coverage }}
          CHANGED_FILES_COUNT: ${{ needs.pr-risk-router.outputs.changed_files_count }}
          CHANGED_RUNTIME_SOURCE_COUNT: ${{ needs.pr-risk-router.outputs.changed_runtime_source_count }}
        run: |
          set -euo pipefail
          mkdir -p artifacts/pr-jacoco

          if [[ "$RUN_CHANGED_COVERAGE" != "true" ]]; then
            python3 -c 'import json, os; summary = {"diff_base": os.environ["DIFF_BASE"], "skipped": True, "reason": "no_runtime_source_changes", "changed_files_count": int(os.environ["CHANGED_FILES_COUNT"]), "changed_runtime_source_count": int(os.environ["CHANGED_RUNTIME_SOURCE_COUNT"]), "passes": True}; output_path = "artifacts/pr-jacoco/changed-coverage.json"; open(output_path, "w", encoding="utf-8").write(json.dumps(summary, indent=2)); print("[pr-changed-coverage] no runtime source changes; recorded explicit skip summary"); print(json.dumps(summary, indent=2))'
            exit 0
          fi

          mapfile -t jacoco_files < <(find artifacts/pr-jacoco -name jacoco.xml -type f | sort)
          if [[ "${#jacoco_files[@]}" -eq 0 ]]; then
            echo "[pr-changed-coverage] FAIL: no shard jacoco.xml files were downloaded" >&2
            exit 1
          fi

          args=()
          for jacoco_file in "${jacoco_files[@]}"; do
            args+=(--jacoco "$jacoco_file")
          done

          python3 scripts/changed_files_coverage.py \
            "${args[@]}" \
            --diff-base "$DIFF_BASE" \
            --src-root erp-domain/src/main/java \
            --threshold-line 0.95 \
            --threshold-branch 0.90 \
            --fail-on-vacuous \
            --output artifacts/pr-jacoco/changed-coverage.json

      - name: Upload changed coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-changed-coverage
          path: artifacts/pr-jacoco/changed-coverage.json
          if-no-files-found: ignore

  pr-merge-gate:
    if: always() && github.event_name == 'pull_request'
    needs:
      - knowledgebase-lint
      - architecture-check
      - enterprise-policy-check
      - orchestrator-layer-check
      - pr-risk-router
      - pr-build
      - pr-auth-tenant
      - pr-accounting
      - pr-idempotency-outbox
      - pr-business-slice
      - pr-persistence-smoke
      - pr-codered-access
      - pr-codered-finance
      - pr-changed-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Evaluate PR gate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          blocking = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in {"success", "skipped"}
          }

          if blocking:
              print("[pr-merge-gate] FAIL: blocking jobs detected")
              for name, result in sorted(blocking.items()):
                  print(f"  - {name}: {result}")
              sys.exit(1)

          print("[pr-merge-gate] OK: all required jobs succeeded or were skipped")
          PY

  gate-fast:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.diff_base != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Fast
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            export DIFF_BASE="${{ github.event.pull_request.base.sha }}"
            export GATE_FAST_RELEASE_VALIDATION_MODE=false
            export GATE_FAST_SYNC_PR_MODE=false
            if [[ "${HEAD_REF}" == sync/* ]]; then
              export GATE_FAST_SYNC_PR_MODE=true
            fi
          else
            export DIFF_BASE="${{ github.event.inputs.diff_base }}"
            export GATE_FAST_RELEASE_VALIDATION_MODE=true
            export GATE_FAST_SYNC_PR_MODE=false
          fi
          bash scripts/gate_fast.sh

      - name: Upload gate-fast artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-fast-artifacts
          path: |
            artifacts/gate-fast/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

  gate-core:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Core
        run: |
          set -euo pipefail
          bash scripts/gate_core.sh

      - name: Upload gate-core artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-core-artifacts
          path: |
            artifacts/gate-core/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

  gate-release:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_gates != 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Release
        env:
          MIGRATION_SET: v2
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          bash scripts/gate_release.sh

      - name: Upload gate-release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-release-artifacts
          path: |
            artifacts/gate-release/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

  gate-reconciliation:
    needs: [knowledgebase-lint, architecture-check, enterprise-policy-check, orchestrator-layer-check]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_gates != 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Reconciliation
        run: |
          set -euo pipefail
          bash scripts/gate_reconciliation.sh

      - name: Upload gate-reconciliation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-reconciliation-artifacts
          path: |
            artifacts/gate-reconciliation/**
            erp-domain/target/surefire-reports/**

  gate-quality:
    needs: [knowledgebase-lint, architecture-check]
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_quality_gate == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Gate Quality
        env:
          FLAKE_RUNS: ${{ github.event.inputs.flake_runs || '20' }}
        run: |
          set -euo pipefail
          bash scripts/gate_quality.sh

      - name: Upload gate-quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-quality-artifacts
          path: |
            artifacts/gate-quality/**
            erp-domain/target/pit-reports/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**
