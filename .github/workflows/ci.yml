  gate-release:
    name: Gate Release
    needs: [ci-config-check, knowledgebase-lint, architecture-check, high-risk-change-control]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.run_release_gates != 'false')
    runs-on: ubuntu-latest
    timeout-minutes: 120
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Guard legacy migration freeze
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.pull_request.base.sha }}"
          elif [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            bash scripts/guard_legacy_migration_freeze.sh --base "${{ github.event.before }}"
          else
            bash scripts/guard_legacy_migration_freeze.sh
          fi

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Release Proof
        env:
          MIGRATION_SET: v2
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGUSER: postgres
          PGPASSWORD: postgres
          PGDATABASE: postgres
        run: |
          set -euo pipefail
          bash scripts/release_proof.sh

      - name: Upload gate-release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gate-release-artifacts
          path: |
            artifacts/gate-release/**
            erp-domain/target/site/jacoco/**
            erp-domain/target/surefire-reports/**

