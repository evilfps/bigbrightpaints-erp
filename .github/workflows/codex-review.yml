name: Codex Review Policy

on:
  pull_request:
  workflow_dispatch:

jobs:
  codex-review-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce Codex review policy
        env:
          REVIEW_POLICY_DIFF_BASE: ${{ github.event.pull_request.base.sha || '' }}
        run: |
          set -euo pipefail
          bash scripts/enforce_codex_review_policy.sh
