name: Codex Autofix (Template)

on:
  workflow_dispatch:
    inputs:
      run_template:
        description: "Run codex autofix template checks"
        required: false
        default: "true"

jobs:
  codex-autofix-template:
    if: github.event.inputs.run_template != 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run autofix template
        run: |
          set -euo pipefail
          bash ci/codex-autofix-template.sh
