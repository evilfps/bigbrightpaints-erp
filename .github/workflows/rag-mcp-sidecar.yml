name: RAG MCP Sidecar

on:
  pull_request:
    paths:
      - "erp-domain/**"
      - "scripts/rag/**"
      - "scripts/rag_*.sh"
      - ".github/workflows/rag-mcp-sidecar.yml"
  workflow_dispatch:

jobs:
  rag-mcp-sidecar:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build/refresh RAG index
        shell: bash
        run: |
          set -euo pipefail
          BASE_SHA=""
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          fi

          if [[ -n "$BASE_SHA" ]]; then
            bash scripts/rag_index.sh --changed-only --diff-base "$BASE_SHA"
          else
            bash scripts/rag_index.sh
          fi

      - name: Run silent-failure detectors
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/rag
          bash scripts/rag_silent_failures.sh --json --top-k 80 --output artifacts/rag/silent_failures.json

      - name: RAG health summary
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import sqlite3
          from pathlib import Path

          db = Path(".tmp/rag/context_index.sqlite")
          if not db.exists():
              raise SystemExit("RAG db missing after indexing")

          conn = sqlite3.connect(str(db))
          cur = conn.cursor()
          summary = {
              "files": cur.execute("SELECT COUNT(*) FROM files").fetchone()[0],
              "chunks": cur.execute("SELECT COUNT(*) FROM chunks").fetchone()[0],
              "facts": cur.execute("SELECT COUNT(*) FROM facts").fetchone()[0],
              "findings": cur.execute("SELECT COUNT(*) FROM findings").fetchone()[0],
              "idempotency_key_types": cur.execute(
                  "SELECT COUNT(*) FROM facts WHERE predicate = 'IDEMPOTENCY_KEY_TYPE'"
              ).fetchone()[0],
              "route_idempotency_key_types": cur.execute(
                  "SELECT COUNT(*) FROM facts WHERE predicate = 'ROUTE_IDEMPOTENCY_KEY_TYPE'"
              ).fetchone()[0],
              "logic_fingerprints": cur.execute(
                  "SELECT COUNT(*) FROM facts WHERE predicate = 'LOGIC_FINGERPRINT'"
              ).fetchone()[0],
          }
          conn.close()

          Path("artifacts/rag").mkdir(parents=True, exist_ok=True)
          Path("artifacts/rag/health_summary.json").write_text(
              json.dumps(summary, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload sidecar artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rag-mcp-sidecar-artifacts
          path: |
            artifacts/rag/**
            .tmp/rag/context_index.sqlite
