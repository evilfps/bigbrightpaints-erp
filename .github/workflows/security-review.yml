name: Security Review

on:
  push:
    branches: [ main ]
  pull_request:
  schedule:
    # Run weekly on Sundays at 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended,security-and-quality

      - name: Build for CodeQL
        run: |
          set -euo pipefail
          cd erp-domain
          mvn -B -ntp -DskipTests compile

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java"

  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITLEAKS_VERSION: "8.30.1"

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSLo "/tmp/${archive}" "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          curl -fsSLo /tmp/gitleaks_checksums.txt "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          awk -v archive="${archive}" '$2 == archive { print }' /tmp/gitleaks_checksums.txt > /tmp/gitleaks_checksum_line.txt
          if [ "$(wc -l < /tmp/gitleaks_checksum_line.txt)" -ne 1 ]; then
            echo "Unexpected number of checksum lines for ${archive}" >&2
            exit 1
          fi
          (cd /tmp && sha256sum -c gitleaks_checksum_line.txt)
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Determine Gitleaks log opts
        id: gitleaks-log-opts
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          head_sha = os.environ["GITHUB_SHA"]
          event = json.loads(event_path.read_text())
          log_opts = ""

          if event_name == "pull_request":
              base_sha = event["pull_request"]["base"]["sha"]
              head_pr_sha = event["pull_request"]["head"]["sha"]
              log_opts = f"{base_sha}..{head_pr_sha}"
          elif event_name == "push":
              before_sha = event.get("before") or ""
              if before_sha and before_sha != "0" * 40:
                  log_opts = f"{before_sha}..{head_sha}"
              else:
                  commit_count = max(len(event.get("commits", [])), 1)
                  log_opts = f"--max-count={commit_count} {head_sha}"

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              print(f"log_opts={log_opts}", file=output)
          PY

      - name: Run Gitleaks
        env:
          GITLEAKS_LOG_OPTS: ${{ steps.gitleaks-log-opts.outputs.log_opts }}
        run: |
          set -euo pipefail
          args=(
            git
            .
            --config .gitleaks.toml
            --redact
            --report-format json
            --report-path gitleaks-report.json
          )
          if [[ -n "${GITLEAKS_LOG_OPTS}" ]]; then
            args+=(--log-opts "${GITLEAKS_LOG_OPTS}")
          fi
          gitleaks "${args[@]}"

  security-review-gate:
    name: Security Review Gate
    if: always()
    needs: [codeql, gitleaks]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Evaluate security gate
        env:
          NEEDS_JSON: ${{ toJson(needs) }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          blocking = {
              name: data["result"]
              for name, data in needs.items()
              if data["result"] not in {"success", "skipped"}
          }

          if blocking:
              print("[security-review-gate] FAIL: blocking jobs detected")
              for name, result in sorted(blocking.items()):
                  print(f"  - {name}: {result}")
              sys.exit(1)

          print("[security-review-gate] OK: all security checks passed or were skipped")
          PY
