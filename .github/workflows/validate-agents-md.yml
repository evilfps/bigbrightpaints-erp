name: Validate AGENTS.md

on:
  push:
    branches: [ main ]
    paths:
      - 'AGENTS.md'
      - 'ci/validate-agents-md.sh'
      - '.github/workflows/validate-agents-md.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'AGENTS.md'
      - 'ci/validate-agents-md.sh'
      - '.github/workflows/validate-agents-md.yml'
  schedule:
    # Run weekly to check freshness
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Validate AGENTS.md
        env:
          MIGRATION_SET: v2
        run: |
          bash ci/validate-agents-md.sh

      - name: Upload validation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agents-md-validation
          path: |
            *.log
          retention-days: 7
          if-no-files-found: ignore
