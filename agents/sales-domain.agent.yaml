id: sales-domain
name: Sales Domain Agent
scope_paths:
  - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/sales/
  - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/sales/
  - erp-domain/src/test/java/com/bigbrightpaints/erp/truthsuite/o2c/
allowed_operations:
  - patch_code
  - add_tests
  - update_sales_docs
required_checks_before_done:
  - cd erp-domain && mvn -B -ntp -Dtest='*Sales*' test
  - bash ci/check-architecture.sh
escalation_triggers:
  - dealer_access_expansion
  - o2c_posting_semantics_change
risk_tier: high
permissions_profile: enterprise_autonomous
timeout_policy: none
cross_module_workflow_required: true
