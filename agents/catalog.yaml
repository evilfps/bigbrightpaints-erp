version: 2
last_reviewed: 2026-02-15
global_policies:
  default_read_exploration_scopes:
    - .
  default_permission_profile: enterprise_autonomous
  default_timeout: none
  cross_module_workflow_first: true
  scope_paths_are_ownership_not_read_limits: true
  recon_mode_no_tests: true
  write_scope_enforced_per_agent: conditional_for_high_risk
  high_risk_changes_require_human_r2: true
  high_risk_changes_require_r2_checkpoint_file: true
  migration_changes_require_runbook_updates: true
  high_risk_logic_changes_require_tests_or_waiver: true
  proof_first_decisions_required: true
  orchestrator_can_close_r1_r2_with_proof: true
  human_required_only_for_irreversible_r3_prod: true
  enterprise_policy_guard_script: ci/check-enterprise-policy.sh
  orchestrator_layer_contract: agents/orchestrator-layer.yaml
agents:
  - id: orchestrator
    name: Orchestrator
    risk_tier: high
    scopes:
      - docs/
      - agents/
      - skills/
      - ci/
      - .github/workflows/
      - asyncloop
    allowed_tools:
      - read_files
      - write_files
      - run_shell
      - run_ci_checks
      - assign_subtasks

  - id: repo-cartographer
    name: Repo Cartographer
    risk_tier: medium
    scopes:
      - docs/
      - ARCHITECTURE.md
      - AGENTS.md
      - ci/
      - erp-domain/docs/
    allowed_tools:
      - read_files
      - write_files
      - run_shell

  - id: full-codebase-explorer
    name: Full Codebase Explorer Agent
    risk_tier: medium
    scopes:
      - erp-domain/
      - scripts/
      - docs/
      - ci/
      - .github/workflows/
      - testing/
    allowed_tools:
      - read_files
      - run_shell

  - id: accounting-domain
    name: Accounting Domain Agent
    risk_tier: critical
    scopes:
      - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/accounting/
