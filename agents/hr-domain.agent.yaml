id: hr-domain
name: HR Domain Agent
scope_paths:
  - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/hr/
  - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/hr/
  - erp-domain/src/test/java/com/bigbrightpaints/erp/truthsuite/payroll/
allowed_operations:
  - patch_code
  - add_tests
  - update_hr_docs
required_checks_before_done:
  - cd erp-domain && mvn -B -ntp -Dtest='*Payroll*' test
  - bash scripts/verify_local.sh
escalation_triggers:
  - payroll_calculation_semantics_change
  - hr_pii_scope_expansion
risk_tier: critical
permissions_profile: enterprise_autonomous
timeout_policy: none
cross_module_workflow_required: true
