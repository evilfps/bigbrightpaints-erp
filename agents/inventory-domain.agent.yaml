id: inventory-domain
name: Inventory Domain Agent
scope_paths:
  - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/inventory/
  - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/inventory/
  - erp-domain/src/test/java/com/bigbrightpaints/erp/truthsuite/inventory/
allowed_operations:
  - patch_code
  - add_tests
  - update_inventory_docs
required_checks_before_done:
  - cd erp-domain && mvn -B -ntp -Dtest='*Inventory*' test
  - bash ci/check-architecture.sh
escalation_triggers:
  - valuation_semantics_change
  - destructive_stock_rebuild
risk_tier: high
permissions_profile: enterprise_autonomous
timeout_policy: none
cross_module_workflow_required: true
