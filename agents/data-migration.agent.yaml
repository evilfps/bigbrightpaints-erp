id: data-migration
name: Data Migration Agent
scope_paths:
  - erp-domain/src/main/resources/db/migration_v2/
  - scripts/
  - docs/runbooks/migrations.md
allowed_operations:
  - design_migration
  - add_migration_script
  - run_dry_run_checks
  - prepare_rollback_plan
required_checks_before_done:
  - bash scripts/flyway_overlap_scan.sh --migration-set v2
  - bash scripts/schema_drift_scan.sh --migration-set v2
  - bash scripts/release_migration_matrix.sh --migration-set v2
escalation_triggers:
  - production_migration_request
  - irreversible_data_rewrite
risk_tier: critical
permissions_profile: enterprise_migration
timeout_policy: none
cross_module_workflow_required: true
