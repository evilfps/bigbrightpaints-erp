      orchestrator:
        role: orchestrator
        config_file: .codex/agents/orchestrator.toml
      orchestrator-runtime:
        role: cross_module
        config_file: .codex/agents/cross_module.toml
      accounting-domain:
        role: cross_module
        config_file: .codex/agents/cross_module.toml
      auth-rbac-company:
        role: cross_module
        config_file: .codex/agents/cross_module.toml
      data-migration:
        role: cross_module
        config_file: .codex/agents/cross_module.toml
      hr-domain:
        role: cross_module
        config_file: .codex/agents/cross_module.toml
      release-ops:
        role: cross_module
        config_file: .codex/agents/cross_module.toml
      security-governance:
