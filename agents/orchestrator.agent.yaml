        preferred_reasoning: high
        fallback:
          - model: gpt-5.3-codex
            reasoning: medium
      frontend_documentation:
        preferred_model: gpt-5.3-codex
        preferred_reasoning: high
        fallback:
          - model: gpt-5.3-codex
            reasoning: medium
      orchestrator_planning:
        preferred_model: gpt-5.2-codex
        preferred_reasoning: xhigh
