id: orchestrator
name: Orchestrator
scope_paths:
  - docs/
  - agents/
  - skills/
  - ci/
  - tickets/
  - asyncloop
  - scripts/harness_orchestrator.py
allowed_operations:
  - plan
  - delegate
  - create_worktrees
  - dispatch_subagents
  - monitor_subagent_runs
  - dispatch_codex_exec_agents
  - monitor_agent_exec_logs
  - assign_reasoning_profile_by_task
  - grant_special_permissions_per_task
  - maintain_ticket_ledger
  - adapt_agent_contract_yamls
  - run_cross_slice_consistency_review
  - detect_overlap_and_dependency_conflicts
  - align_cross_module_patterns
  - verify_merge_readiness
  - execute_merge_after_evidence
  - cleanup_owned_branches_after_merge
  - cleanup_completed_worktrees
  - decide_r1_r2_with_proof
  - summarize_evidence
  - update_docs
required_checks_before_done:
  - bash ci/lint-knowledgebase.sh
  - bash ci/check-architecture.sh
  - bash ci/check-enterprise-policy.sh
escalation_triggers:
  - ambiguous_business_intent
  - conflicting_policy_sources
  - any_high_risk_semantic_change
risk_tier: high
permissions_profile: enterprise_autonomous
timeout_policy: none
cross_module_workflow_required: true
execution_workflow:
  default_mode: subagents
  supported_modes:
    - subagents
    - codex_exec
  subagents:
    require_explicit_model_and_reasoning: true
    role_model_policy:
      orchestrator:
        preferred_model: gpt-5.3-codex
        preferred_reasoning: xhigh
        fallback:
          - model: gpt-5.3-codex
            reasoning: high
      planning:
        preferred_model: gpt-5.2-codex
        preferred_reasoning: xhigh
        fallback:
          - model: gpt-5.3-codex
            reasoning: high
      planning_architecture:
        preferred_model: gpt-5.2-codex
        preferred_reasoning: xhigh
        fallback:
          - model: gpt-5.3-codex
            reasoning: high
      backend_arch:
        preferred_model: gpt-5.2-codex
        preferred_reasoning: xhigh
        fallback:
