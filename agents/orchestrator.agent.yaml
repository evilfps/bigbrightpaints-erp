        config_file: .codex/agents/cross_module_high.toml
      frontend-documentation:
        role: frontend_documentation
        config_file: .codex/agents/frontend_arch.toml
      qa-reliability:
        role: code_reviewer
        config_file: .codex/agents/code_reviewer.toml
      repo-cartographer:
        role: planning_architecture
        config_file: .codex/agents/planning_architecture.toml
      full-codebase-explorer:
        role: planning
        config_file: .codex/agents/planning.toml
      default:
        role: cross_module_high
        config_file: .codex/agents/cross_module_high.toml
    execution_rules:
      - each subagent must be bound to one ticket slice and one YAML role
      - each subagent must read only its own task packet before coding
      - each subagent must identify itself in first line of every result
      - orchestrator must monitor drift and interrupt on cross-scope edits
      - orchestrator must choose subagent custom role from `agent_role_mapping` before dispatch
  codex_exec:
    require_explicit_model_and_reasoning: true
    default_model: gpt-5.3-codex
    command_template: codex exec -m gpt-5.3-codex -c model_reasoning_effort="<high|medium|low|minimal>" --dangerously-bypass-approvals-and-sandbox
    canonical_full_access_command: codex exec -m gpt-5.3-codex -c model_reasoning_effort="<high|medium|low|minimal>" --dangerously-bypass-approvals-and-sandbox
    full_access_flag: --dangerously-bypass-approvals-and-sandbox
    cli_help_note: codex exec --help lists canonical full-access flag; --yolo is compatibility alias only
    compatibility_aliases:
      - --yolo
    reasoning_policy:
      xhigh: high-risk semantics (accounting, auth, migration, orchestration)
      high: medium-high complexity feature or bug slice
      medium: straightforward bounded edits
    isolation_rules:
      - run inside ticket-scoped worktree only
      - bind worker to assigned yaml and task packet only
      - capture command log and evidence in ticket artifacts
interaction_contract:
  main_cli_session_must_remain_active: true
  when_idle_or_new_ticket:
    - continue autonomously on highest-priority open ticket/slice
    - if no active slice is available, prepare next ticket from ERP_STAGING_MASTER_PLAN
    - keep 2-3 preplanned ready tickets to sustain throughput
    - keep ticket artifacts and master-plan progress updated as work advances
    - do not pause for input unless an irreversible R3 decision is required
    - stop only when human sends exact prompt `STOP`
  while_workers_running:
    - monitor worker execution logs and harness evidence continuously
    - keep planning/bootstrapping upcoming goal tickets in parallel
    - maintain at least 2-3 preplanned ready tickets at all times
    - if ready backlog drops below 2, create next ticket/slices immediately
  require_agent_identity_on_every_submission: true
  require_ticket_claim_before_edits: true
  claim_record_locations:
    - tickets/<TKT-ID>/ticket.yaml
    - tickets/<TKT-ID>/TIMELINE.md
  claim_fields_required:
    - slice_id
    - agent_id
    - branch
    - worktree
    - started_at_utc
  do_not_touch_claimed_slices_of_other_agents: true
  codex_open_command: codex --yolo
  autonomous_default: true
  halt_conditions:
    - human_prompt_exact_STOP
    - irreversible_r3_decision_required
governance_rules:
  - orchestrator decides next steps; workers do not self-assign
  - orchestrator role is coordination-first and should not absorb worker implementation scope unless no matching worker role exists
  - every worker must claim ticket slice before edits and release claim on done/blocked
  - each worktree gets isolated task packet
  - reviewers are review-only and never implement code
  - docs-only commits must skip review subagents and must never trigger `@codex review` PR comments
  - non-doc commits require dedicated code_reviewer output with severity-tagged findings or explicit no-findings + residual-risk statement
  - enforce scope_paths before dispatch and before merge
  - block overlap and scope violations before merge
  - static review is mandatory before merge
  - permission elevation may be granted per task with explicit rationale and monitoring
permission_grant_policy:
  allow_task_specific_grants: true
  required_before_grant:
    - explicit task rationale linked to slice objective
    - boundary impact assessment documented in ticket timeline
    - orchestrator monitoring enabled for the entire elevated run
  revoke_after_task_completion: true
branch_hygiene:
  cleanup_owned_branches_after_merge: true
  cleanup_scope: orchestrator_created_only
  protect_user_owned_branches: true
  require_full_green_before_merge: true
  sequence_policy:
    - merge one ticket slice branch at a time into base
    - after each merge, run required checks on merged base SHA before next merge
    - push base branch immediately after successful merged-sha checks
    - update ticket status and closure artifacts before starting next ticket
  worktree_base_policy:
    - new ticket worktrees must be created from latest pushed base branch HEAD
    - canonical base branch is harness-engineering-orchestrator unless ticket overrides
    - never branch new ticket worktrees from prior ticket slice branches
    - if base is behind remote, fetch and fast-forward base before bootstrap
  worktree_clone_policy:
    - clone/fetch once, then create isolated worktrees under ../orchestrator_erp_worktrees/<TKT-ID>/
    - one agent per worktree; one slice per branch
    - worktree names should include ticket id and agent id
    - do not reuse stale worktrees after base branch advances
  pr_tracking_policy:
    - if using direct merges (no PR), record explicit reason in ticket timeline
    - if PR is created, record URL in ticket summary and close/delete slice branch only after merge
    - verify remote branch and PR state before branch deletion
