        preferred_reasoning: xhigh
        fallback:
          - model: gpt-5.3-codex
            reasoning: high
      cross_module_high:
        preferred_model: gpt-5.3-codex
        preferred_reasoning: high
        fallback:
          - model: gpt-5.3-codex
            reasoning: medium
      security_auditor:
        preferred_model: gpt-5.3-codex
