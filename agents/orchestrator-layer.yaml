      repo-cartographer:
        role: planning_architecture
        config_file: .codex/agents/planning_architecture.toml
      full-codebase-explorer:
        role: exploration
        config_file: .codex/agents/explorer.toml
      default:
        role: cross_module_high
        config_file: .codex/agents/cross_module_high.toml
    drift_policy:
      allow_minor_context_drift: true
      implementation_commits_must_return_to_slice_scope: true
      orchestrator_interrupt_on_scope_violation: true
  codex_exec:
    require_explicit_model_and_reasoning: true
    default_model: gpt-5.3-codex
    command_template: codex exec -m gpt-5.3-codex -c model_reasoning_effort="<high|medium|low|minimal>" --dangerously-bypass-approvals-and-sandbox
    canonical_full_access_command: codex exec -m gpt-5.3-codex -c model_reasoning_effort="<high|medium|low|minimal>" --dangerously-bypass-approvals-and-sandbox
    full_access_flag: --dangerously-bypass-approvals-and-sandbox
    cli_help_note: codex exec --help lists canonical full-access flag; --yolo is compatibility alias only
    compatibility_aliases:
      - --yolo
    reasoning_policy:
      xhigh: high-risk semantics (accounting, auth, migration, orchestration)
      high: medium-high complexity feature/bug slice
      medium: simple bounded task
  allow_special_permission_grants: true
  require_orchestrator_monitoring_for_permission_grants: true
  required_slice_outputs:
    - files_changed
    - commands_run
    - harness_results
    - residual_risks
    - blockers_or_next_step
    - ticket_claim_evidence
    - worktree_validation
    - codebase_impact_analysis
automation:
  harness_cli: scripts/harness_orchestrator.py
  ticket_root: tickets/
  ticket_template: docs/agents/templates/TICKET_TEMPLATE.md
  task_packet_template: docs/agents/templates/TASK_PACKET.md
  review_template: docs/agents/templates/REVIEW_EVIDENCE.md
  orchestrator_review_template: docs/agents/templates/ORCHESTRATOR_REVIEW.md
  default_worktree_root: ../orchestrator_erp_worktrees
  cleanup_worktrees_on_merge: true
  cleanup_owned_branches_on_merge: true
  cleanup_branch_scope: orchestrator_created_only
  canonical_base_branch: harness-engineering-orchestrator
  clone_and_worktree_policy:
    clone_remote: git@github.com:anasibnanwar-XYE/bigbrightpaints-erp.git
    create_worktree_from_base: git fetch origin && git checkout harness-engineering-orchestrator && git pull --ff-only origin harness-engineering-orchestrator && git worktree add ../orchestrator_erp_worktrees/<TKT-ID>/<agent-id> -b tickets/<tkt-id>/<agent-id> harness-engineering-orchestrator
    one_slice_per_branch: true
    one_agent_per_worktree: true
  codex_open_command: codex --yolo
  throughput_backlog_policy:
    minimum_preplanned_ready_tickets: 2
    target_preplanned_ready_tickets: 3
    enforce_during_active_worker_runs: true
    replenish_trigger_threshold: 2
    source_of_truth: docs/system-map/Goal/ERP_STAGING_MASTER_PLAN.md
dispatch_protocol:
  main_cli_session_must_remain_active: true
  ask_human_next_focus_when_idle: false
  autonomous_continuous_execution: true
  stop_condition_exact_prompt: STOP
  mandatory_spawn_role_sequence:
    - planning
    - implementation
    - merge_specialist
    - code_reviewer
    - qa_reliability
    - release_ops
  require_planning_subagent_before_implementation: true
  require_merge_specialist_before_code_review: true
  require_merge_specialist_for_non_doc_slices: true
  require_code_reviewer_for_non_doc_slices: true
  require_code_reviewer_before_qa: true
  planner_owns_specialized_role_assignment: true
  require_qa_reliability_for_non_doc_slices: true
  require_release_ops_docs_sync_before_merge: true
  require_reviewer_head_sha_match: true
  require_qa_after_code_review_timestamp: true
  enforce_changed_file_docs_only_classification: true
  require_frontend_contract_docs_sync_on_api_surface_change: true
  enforce_ticket_first_gate: true
  require_worktree_branch_validation_before_edits: true
  require_codebase_impact_analysis_in_results: true
  base_branches_read_only_for_implementation:
    - harness-engineering-orchestrator
    - main
    - master
  when_idle:
    - continue highest-priority planned ticket automatically
    - if all active tickets are blocked, create and prepare next goal-aligned ticket
    - maintain at least 2-3 preplanned ready tickets for throughput
    - keep `tickets/` artifacts and ERP_STAGING_MASTER_PLAN progress current
  while_workers_running:
    - keep monitoring active worker logs/evidence and unblock promptly
    - keep planning/bootstrapping upcoming goal tickets in parallel
    - replenish backlog immediately if ready tickets drop below two
  flow_command_templates:
    subagents: configure per-role model/reasoning from runtime.subagents.role_model_policy and dispatch one slice per worktree
    codex_exec: codex exec -m gpt-5.3-codex -c model_reasoning_effort="<high|medium|low|minimal>" --dangerously-bypass-approvals-and-sandbox
  require_agent_identity_on_every_submission: true
  require_ticket_claim_before_work: true
  ticket_claim_enforcement:
    claim_status: taken
    allowed_transitions:
      - ready -> taken
      - taken -> in_progress
      - in_progress -> in_review
      - in_review -> done
      - in_progress -> blocked
      - blocked -> ready
    required_fields:
      - agent_id
      - slice_id
      - worktree_path
      - branch
      - claimed_at_utc
    require_timeline_claim_event: true
    allow_legacy_timeline_claim_lines: true
    require_ticket_status_history: true
    claim_artifacts:
      - tickets/<TKT-ID>/ticket.yaml
      - tickets/<TKT-ID>/TIMELINE.md
    reject_unclaimed_agent_results: true
    prevent_dual_claims_for_same_slice: true
  task_packet_isolation_required: true
  prevent_cross_slice_packet_reads: true
  agent_yaml_binding_required: true
  static_review_required_before_merge: true
  permission_grant_governance:
    allowed: true
    require_ticket_evidence: true
    require_orchestrator_live_monitoring: true
    auto_revoke_after_slice: true
cross_module_protocol:
  sequence:
    - contracts_events_interfaces
    - producer_module
    - consumer_modules
    - orchestrator_integration
  require_architecture_guard: true
  require_allowlist_evidence_for_new_edges: true

routing_rules:
