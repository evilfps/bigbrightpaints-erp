version: 1
last_reviewed: 2026-02-24
orchestrator_id: orchestrator
decision_model:
  mode: proof_first
  authority:
    r1: orchestrator
    r2: orchestrator
    r3: human
runtime:
  loop_source: asyncloop
  no_timeout: true
  max_parallel_slices: 4
  execution_mode_default: subagents
  execution_mode_supported:
