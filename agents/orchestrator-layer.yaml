version: 1
last_reviewed: 2026-02-15
orchestrator_id: orchestrator
decision_model:
  mode: proof_first
  authority:
    r1: orchestrator
    r2: orchestrator
    r3: human
runtime:
  loop_source: asyncloop
  no_timeout: true
  max_parallel_slices: 4
  execution_mode_default: codex_exec
  execution_mode_supported:
    - codex_exec
    - tmux
  codex_exec:
    require_explicit_model_and_reasoning: true
    default_model: gpt-5.3-codex
    command_template: codex exec --model gpt-5.3-codex --reasoning <xhigh|high|medium> --yolo
    full_access_flag: --yolo
    reasoning_policy:
      xhigh: high-risk semantics (accounting, auth, migration, orchestration)
      high: medium-high complexity feature/bug slice
      medium: simple bounded task
  allow_special_permission_grants: true
  require_orchestrator_monitoring_for_permission_grants: true
  required_slice_outputs:
    - files_changed
    - commands_run
    - harness_results
    - residual_risks
    - blockers_or_next_step
automation:
  harness_cli: scripts/harness_orchestrator.py
  ticket_root: tickets/
  ticket_template: docs/agents/templates/TICKET_TEMPLATE.md
  task_packet_template: docs/agents/templates/TASK_PACKET.md
  review_template: docs/agents/templates/REVIEW_EVIDENCE.md
  orchestrator_review_template: docs/agents/templates/ORCHESTRATOR_REVIEW.md
  default_worktree_root: ../orchestrator_erp_worktrees
  cleanup_worktrees_on_merge: true
  cleanup_owned_branches_on_merge: true
  cleanup_branch_scope: orchestrator_created_only
  codex_open_command: codex --yolo
  tmux_lanes:
    - w1
    - w2
    - w3
    - w4
dispatch_protocol:
  ask_human_next_focus_when_idle: true
  flow_options_for_human:
    - codex_exec
    - tmux
  flow_command_templates:
    codex_exec: codex exec --model gpt-5.3-codex --reasoning <xhigh|high|medium> --yolo
    tmux: tmux new-session -d -s <ticket> 'cd <worktree> && codex --yolo'
  require_agent_identity_on_every_submission: true
  task_packet_isolation_required: true
  prevent_cross_slice_packet_reads: true
  agent_yaml_binding_required: true
  static_review_required_before_merge: true
cross_module_protocol:
  sequence:
    - contracts_events_interfaces
    - producer_module
    - consumer_modules
    - orchestrator_integration
  require_architecture_guard: true
  require_allowlist_evidence_for_new_edges: true

routing_rules:
  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/accounting/
        - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/accounting/
    primary_agent: accounting-domain
    reviewers:
      - qa-reliability
      - security-governance

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/inventory/
        - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/inventory/
    primary_agent: inventory-domain
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/sales/
        - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/sales/
    primary_agent: sales-domain
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/hr/
        - erp-domain/src/test/java/com/bigbrightpaints/erp/modules/hr/
    primary_agent: hr-domain
    reviewers:
      - qa-reliability
      - security-governance

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/auth/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/rbac/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/company/
    primary_agent: auth-rbac-company
    reviewers:
      - security-governance
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/orchestrator/
    primary_agent: orchestrator-runtime
    reviewers:
      - qa-reliability
      - security-governance

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/purchasing/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/invoice/
    primary_agent: purchasing-invoice-p2p
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/factory/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/production/
    primary_agent: factory-production
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/reports/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/admin/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/portal/
    primary_agent: reports-admin-portal
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/resources/db/migration_v2/
    primary_agent: data-migration
    reviewers:
      - security-governance
      - release-ops

  - match:
      paths:
        - .github/workflows/
        - scripts/
        - ci/
    primary_agent: release-ops
    reviewers:
      - qa-reliability

  - match:
      paths:
        - agents/
        - docs/agents/
        - tickets/
        - scripts/harness_orchestrator.py
    primary_agent: orchestrator
    reviewers:
      - repo-cartographer
      - qa-reliability

  - match:
      paths:
        - docs/
        - ARCHITECTURE.md
        - AGENTS.md
    primary_agent: repo-cartographer
    reviewers:
      - orchestrator

  - match:
      paths:
        - docs/*portal*
    primary_agent: frontend-documentation
    reviewers:
      - repo-cartographer

always_available_agents:
  - full-codebase-explorer
  - refactor-techdebt-gc

review_pipeline:
  minimum_review_agents_per_slice: 1
  require_orchestrator_premerge_review: true
  block_on_cross_slice_overlaps: true
  block_on_scope_violations: true
  require_static_review_before_merge: true
  require_codex_review_guidelines_check: true
  required_checks:
    - bash ci/lint-knowledgebase.sh
    - bash ci/check-architecture.sh
    - bash ci/check-enterprise-policy.sh
  high_risk_additional_reviewers:
    - security-governance
    - qa-reliability

commit_policy:
  model:
    - primary implementation agent commits code for its slice
    - review-only agents do not commit code
    - orchestrator commits only orchestration/policy/docs artifacts unless explicitly taking ownership
  required_message_prefixes:
    - "orch:"
    - "acct:"
    - "inv:"
    - "sales:"
    - "hr:"
    - "auth:"
    - "migr:"
    - "ops:"
  require_review_evidence_before_commit: true

completion_contract:
  mark_done_only_when:
    - required_checks_pass
    - review_pipeline_complete
    - evidence_recorded_in_asyncloop
    - no_scope_violations
