        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/factory/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/production/
    primary_agent: factory-production
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/reports/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/admin/
        - erp-domain/src/main/java/com/bigbrightpaints/erp/modules/portal/
    primary_agent: reports-admin-portal
    reviewers:
      - qa-reliability

  - match:
      paths:
        - erp-domain/src/main/resources/db/migration_v2/
    primary_agent: data-migration
    reviewers:
      - security-governance
      - release-ops

  - match:
      paths:
        - .github/workflows/
        - scripts/
        - ci/
    primary_agent: release-ops
    reviewers:
      - qa-reliability

  - match:
      paths:
        - agents/
        - docs/agents/
        - tickets/
        - scripts/harness_orchestrator.py
    primary_agent: orchestrator
    reviewers:
      - repo-cartographer
      - qa-reliability

  - match:
      paths:
        - docs/
        - ARCHITECTURE.md
        - AGENTS.md
    primary_agent: repo-cartographer
    reviewers:
      - orchestrator

  - match:
      paths:
        - docs/*portal*
    primary_agent: frontend-documentation
    reviewers:
      - repo-cartographer

always_available_agents:
  - full-codebase-explorer
  - merge-specialist
  - refactor-techdebt-gc

review_pipeline:
  minimum_review_agents_per_slice: 1
  require_orchestrator_premerge_review: true
  block_on_cross_slice_overlaps: true
  block_on_scope_violations: true
  require_static_review_before_merge: true
  require_codex_review_guidelines_check: true
  require_merge_specialist_for_non_doc_slices: true
  require_code_reviewer_for_non_doc_slices: true
  require_qa_reliability_for_non_doc_slices: true
  require_merge_specialist_before_code_review: true
  require_code_reviewer_before_qa: true
  require_reviewer_head_sha_match: true
  require_qa_after_code_review_timestamp: true
  enforce_changed_file_docs_only_classification: true
  require_release_ops_for_non_doc_docs_sync: true
  docs_only_policy:
    skip_review_subagents: true
    skip_codex_review_comment: true
    required_checks:
      - bash ci/lint-knowledgebase.sh
  required_checks:
    - bash ci/lint-knowledgebase.sh
    - bash ci/check-architecture.sh
    - bash ci/check-enterprise-policy.sh
  high_risk_additional_reviewers:
    - security-governance
    - qa-reliability

commit_policy:
  model:
    - primary implementation agent commits code for its slice
    - review-only agents do not commit code
    - orchestrator commits only orchestration/policy/docs artifacts unless explicitly taking ownership
  required_message_prefixes:
    - "orch:"
    - "acct:"
    - "inv:"
    - "sales:"
    - "hr:"
    - "auth:"
    - "migr:"
    - "ops:"
  require_review_evidence_before_commit: true

completion_contract:
  mark_done_only_when:
    - required_checks_pass
    - review_pipeline_complete
    - evidence_recorded_in_asyncloop
    - no_scope_violations
    - ticket_claim_released_or_closed
branch_execution_policy:
  merge_sequence:
    - merge one ticket slice branch at a time into base
    - rerun required checks on merged base SHA after each merge
    - push base immediately after merged-sha checks pass
    - only then proceed to next ticket merge
    - base branches are integration-only; do not implement directly on them
  worktree_base:
    - bootstrap new ticket worktrees from latest pushed base HEAD
    - base branch must be refreshed (fetch + fast-forward) before each new worktree
    - never bootstrap from old slice branches
    - if local base is behind, fetch + fast-forward before ticket bootstrap
  pr_and_branch_hygiene:
    - if PR workflow is used, record PR URL in ticket summary/timeline
    - PR title and description must include ticket id and slice id
    - if direct merge workflow is used, record direct-merge rationale in timeline
    - merge only after all required checks are green on latest head commit
    - delete only orchestrator-created branches after merge confirmation
