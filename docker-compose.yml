services:
  db:
    image: postgres:16-alpine
    container_name: erp_db
    environment:
      POSTGRES_DB: erp_domain
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD before starting compose}
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: erp_rabbit
    ports:
      - "${RABBIT_PORT:-5672}:5672"
      - "${RABBIT_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: erp_mailhog
    ports:
      - "${MAILHOG_SMTP_PORT:-1025}:1025"
      - "${MAILHOG_UI_PORT:-8025}:8025"

  app:
    build:
      context: .
      dockerfile: erp-domain/Dockerfile
    container_name: erp_domain_app
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod,flyway-v2}
      SERVER_PORT: 8081
      MANAGEMENT_SERVER_PORT: 9090
      # Prod-like compose contract: provide datasource values explicitly via `.env` or shell env.
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?Set SPRING_DATASOURCE_URL before starting the prod,flyway-v2 app}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:?Set SPRING_DATASOURCE_USERNAME before starting the prod,flyway-v2 app}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:?Set SPRING_DATASOURCE_PASSWORD before starting the prod,flyway-v2 app}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to a 256-bit secret before starting}
      JWT_ACCESS_TTL: 900
      JWT_REFRESH_TTL: 2592000
      ERP_SECURITY_ENCRYPTION_KEY: ${ERP_SECURITY_ENCRYPTION_KEY:?Set ERP_SECURITY_ENCRYPTION_KEY (32+ bytes) before starting}
      ERP_SECURITY_AUDIT_PRIVATE_KEY: ${ERP_SECURITY_AUDIT_PRIVATE_KEY:?Set ERP_SECURITY_AUDIT_PRIVATE_KEY before starting}
      ERP_DISPATCH_DEBIT_ACCOUNT_ID: ${ERP_DISPATCH_DEBIT_ACCOUNT_ID:-0}
      ERP_DISPATCH_CREDIT_ACCOUNT_ID: ${ERP_DISPATCH_CREDIT_ACCOUNT_ID:-0}
      # Disable fail-fast config checks for local/dev unless explicitly enabled.
      ERP_ENVIRONMENT_VALIDATION_ENABLED: ${ERP_ENVIRONMENT_VALIDATION_ENABLED:-false}
      ERP_CORS_ALLOW_TAILSCALE_HTTP_ORIGINS: ${ERP_CORS_ALLOW_TAILSCALE_HTTP_ORIGINS:-false}
      ERP_CORS_ALLOWED_ORIGINS: ${ERP_CORS_ALLOWED_ORIGINS:-https://app.bigbrightpaints.com}
      ERP_LICENSE_ENFORCE: ${ERP_LICENSE_ENFORCE:-false}
      ERP_LICENSE_PRODUCT_ID: ${ERP_LICENSE_PRODUCT_ID:-31720}
      ERP_LICENSE_KEY: ${ERP_LICENSE_KEY:-}
      ERP_VALIDATION_SEED_ENABLED: ${ERP_VALIDATION_SEED_ENABLED:-false}
      ERP_VALIDATION_SEED_PASSWORD: ${ERP_VALIDATION_SEED_PASSWORD:-}
      ERP_SEED_MOCK_ADMIN_EMAIL: ${ERP_SEED_MOCK_ADMIN_EMAIL:-}
      ERP_SEED_MOCK_ADMIN_PASSWORD: ${ERP_SEED_MOCK_ADMIN_PASSWORD:-}
      ERP_MAIL_FROM: ${ERP_MAIL_FROM:-noreply@bigbrightpaints.com}
      ERP_MAIL_BASE_URL: ${ERP_MAIL_BASE_URL:-http://localhost:3000}
      # Local compose may point SMTP at MailHog. Release env must override every Spring mail value.
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST:-mailhog}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT:-1025}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME:-mailhog-user}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD:-mailhog-password}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:-false}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: ${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:-false}
    ports:
      - "${APP_PORT:-8081}:8081"
      - "${MANAGEMENT_PORT:-9090}:9090"

volumes:
  postgres_data:
  rabbitmq_data:
